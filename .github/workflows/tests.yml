name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  pest:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.3"
            testbench: "^10.11"
            laravel: "^12.0"
          - php: "8.4"
            testbench: "^10.11"
            laravel: "^12.0"
          - php: "8.3"
            testbench: "^11.0"
            laravel: "^13.0"
          - php: "8.4"
            testbench: "^11.0"
            laravel: "^13.0"

    name: Pest (PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-composer-
            ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install dependencies for matrix
        run: |
          composer require --dev "orchestra/testbench:${{ matrix.testbench }}" "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run Pest test suite
        run: ./vendor/bin/pest

  vitest:
    runs-on: ubuntu-latest
    name: Vitest (Node 24)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Node dependencies
        run: npm install

      - name: Run Vitest suite
        run: npx vitest run tests/js